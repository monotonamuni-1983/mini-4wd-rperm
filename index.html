<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer (8192 FFT + Auto Range + Calibration)</title>
<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 20px;
  }
  #specCanvas {
    width: 100%;
    height: 200px;
    background: #000;
    display: block;
    margin-bottom: 20px;
  }
  .control-box, .cal-box, .display-box {
    background: #fff;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
  }
  .range-slider {
    position: relative;
    height: 40px;
  }
  .range-slider input[type=range] {
    position: absolute;
    width: 100%;
    pointer-events: none;
    -webkit-appearance: none;
    background: none;
  }
  .slider-track {
    position: absolute;
    height: 6px;
    background: #00c896;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 3px;
  }
</style>
</head>
<body>

<h2>Mini4WD RPM Analyzer (8192 FFT + Auto Range + Calibration)</h2>

<button id="startButton">計測開始</button>
<button id="stopButton">計測停止</button>

<canvas id="specCanvas"></canvas>

<div class="control-box">
  <div>計測範囲 (RPM)</div>
  <div class="range-slider">
    <input type="range" id="minRpm" min="5000" max="60000" value="5000">
    <input type="range" id="maxRpm" min="5000" max="60000" value="55000">
    <div class="slider-track"></div>
  </div>
  <div style="margin-top:6px; font-size:14px;">
    最小RPM: <span id="minRpmLabel">5000</span>
    ／ 最大RPM: <span id="maxRpmLabel">55000</span>
  </div>
</div>

<div class="cal-box">
  <div class="cal-label">キャリブレーション（既知RPMで1回だけ合わせる）</div>
  <div style="margin-bottom:6px;">
    既知RPM:
    <input type="number" id="knownRpmInput" placeholder="例: 30000">
    <button id="applyCalButton" style="width:auto; padding:4px 10px; font-size:12px;">
      この値で合わせる
    </button>
  </div>
  <div class="cal-info">
    現在の補正係数: <span id="calFactorLabel">1.0000</span><br>
    ※ 端末ごとに1回だけ合わせれば、以降は自動で補正されます。
  </div>
</div>

<div class="display-box">
  <div>現在の回転数 (8192 FFT / Auto Range / Calibration)</div>
  <div id="rpmFinal">-- RPM</div>
</div>

<script>
let audioCtx = null;
let analyser = null;
let dataArray = null;
let running = false;
let stream = null;

const FFT_SIZE = 8192;

const canvas = document.getElementById('specCanvas');
const ctx = canvas.getContext('2d');

const minSlider = document.getElementById("minRpm");
const maxSlider = document.getElementById("maxRpm");
const track = document.querySelector(".slider-track");
const minLabel = document.getElementById("minRpmLabel");
const maxLabel = document.getElementById("maxRpmLabel");

let calFactor = 1.0;
const calFactorLabel = document.getElementById("calFactorLabel");
const knownRpmInput = document.getElementById("knownRpmInput");
const applyCalButton = document.getElementById("applyCalButton");

let lastRpm = null;
let lastPeakBin = null;
let autoRangeLocked = false;

/* ---- 補正係数ロード ---- */
(function loadCalFactor() {
  const saved = localStorage.getItem("mini4wd_cal_factor_8192");
  if (saved !== null) {
    const v = parseFloat(saved);
    if (!isNaN(v) && v > 0 && v < 2) calFactor = v;
  }
  calFactorLabel.textContent = calFactor.toFixed(4);
})();


/* ---- スライダー表示更新 ---- */
function updateLabels() {
  minLabel.textContent = minSlider.value;
  maxLabel.textContent = maxSlider.value;
}

function updateTrack() {
  const minVal = parseInt(minSlider.value, 10);
  const maxVal = parseInt(maxSlider.value, 10);
  const minPercent = (minVal - minSlider.min) / (minSlider.max - minSlider.min) * 100;
  const maxPercent = (maxVal - maxSlider.min) / (maxSlider.max - maxSlider.min) * 100;
  track.style.left = minPercent + "%";
  track.style.width = (maxPercent - minPercent) + "%";
}

/* ---- スライダー操作 ---- */
minSlider.addEventListener("input", () => {
  if (parseInt(minSlider.value, 10) > parseInt(maxSlider.value, 10)) {
    minSlider.value = maxSlider.value;
  }
  autoRangeLocked = true;
  updateTrack();
  updateLabels();
});

maxSlider.addEventListener("input", () => {
  if (parseInt(maxSlider.value, 10) < parseInt(minSlider.value, 10)) {
    maxSlider.value = minSlider.value;
  }
  autoRangeLocked = true;
  updateTrack();
  updateLabels();
});

updateTrack();
updateLabels();

/* ---- キャリブレーション ---- */
applyCalButton.addEventListener("click", () => {
  const knownRpm = parseFloat(knownRpmInput.value);
  if (!knownRpm || knownRpm <= 0) return;
  if (!lastRpm || lastRpm <= 0) return;

  const rawRpm = lastRpm / calFactor;
  if (rawRpm <= 0) return;

  const newFactor = knownRpm / rawRpm;
  if (newFactor > 0 && newFactor < 2) {
    calFactor = newFactor;
    localStorage.setItem("mini4wd_cal_factor_8192", calFactor.toFixed(6));
    calFactorLabel.textContent = calFactor.toFixed(4);
  }
});

/* ---- RPMスムージング ---- */
function getSmoothAlpha(rpm) {
  if (rpm < 20000) return 0.30;
  if (rpm < 30000) return 0.25;
  if (rpm < 40000) return 0.20;
  return 0.18;
}

/* ---- Auto Range ---- */
function autoAdjustRange(rpm) {
  if (autoRangeLocked) return;
  const span = 5000;
  const min = Math.max(5000, rpm - span);
  const max = Math.min(55000, rpm + span);
  minSlider.value = Math.round(min);
  maxSlider.value = Math.round(max);
  updateTrack();
  updateLabels();
}
/* ============================================================
   ★★★ ピーク検出強化版 getPrecisePeakHz（完全統合版）★★★
   - lastPeakBin 周囲 ±10bin の優先探索
   - 山の形チェック（左右差・尖りノイズ除外）
   - 振幅急変ノイズ除外
   - 3点補間の安定化
   ============================================================ */
function getPrecisePeakHz(data, fftSize, sampleRate) {
  const minRpm = parseInt(minSlider.value, 10);
  const maxRpm = parseInt(maxSlider.value, 10);

  const minFreq = minRpm / 60;
  const maxFreq = maxRpm / 60;

  const binToHz = sampleRate / fftSize;
  const minBin = Math.floor(minFreq / binToHz);
  const maxBin = Math.floor(maxFreq / binToHz);

  const len = data.length;
  const from = Math.max(2, Math.min(minBin, len - 3));
  const to   = Math.max(3, Math.min(maxBin, len - 2));

  let bestIdx = -1;
  let bestVal = -Infinity;

  /* ---- 1) 前回ピークの周囲 ±10bin を優先探索 ---- */
  if (lastPeakBin !== null) {
    const center = Math.floor(lastPeakBin);
    const radius = 10;
    const sFrom = Math.max(from, center - radius);
    const sTo   = Math.min(to,   center + radius);

    for (let i = sFrom; i <= sTo; i++) {
      const v = data[i];
      if (v > bestVal) {
        bestVal = v;
        bestIdx = i;
      }
    }
  }

  /* ---- 2) 全域探索（バックアップ） ---- */
  if (bestIdx === -1) {
    for (let i = from; i <= to; i++) {
      const v = data[i];
      if (v > bestVal) {
        bestVal = v;
        bestIdx = i;
      }
    }
  }

  if (bestIdx <= from || bestIdx >= to) return 0;

  /* ---- 3) 山の形チェック（ノイズ除外） ---- */
  const L = data[bestIdx - 1];
  const C = data[bestIdx];
  const R = data[bestIdx + 1];

  // 左右が極端に低い → 尖りノイズ
  if (C - Math.max(L, R) < 3) return 0;

  // 左右の傾きが不自然 → ノイズ
  if (Math.abs(L - R) > 40) return 0;

  /* ---- 4) 3点補間（安定化） ---- */
  const denom = (L - 2 * C + R);
  const offset = denom === 0 ? 0 : (L - R) / (2 * denom);
  const peakBin = bestIdx + offset;

  lastPeakBin = peakBin;

  return peakBin * binToHz;
}


/* ============================================================
   ★★★ メインループ / FFT描画 / RPM計算 ★★★
   ============================================================ */
async function startAudio() {
  if (running) return;
  running = true;

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;

  const binCount = analyser.frequencyBinCount;
  dataArray = new Uint8Array(binCount);

  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  lastRpm = null;
  lastPeakBin = null;
  autoRangeLocked = false;

  loop();
}

function stopAudio() {
  running = false;
  if (audioCtx) audioCtx.suspend();
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById("rpmFinal").textContent = "-- RPM";
}

/* ---- メインループ ---- */
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);

  const w = canvas.width;
  const h = canvas.height;

  analyser.getByteFrequencyData(dataArray);

  /* ---- FFT描画 ---- */
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.strokeStyle = "#00ff9d";
  ctx.lineWidth = 1.2;

  const step = dataArray.length / w;
  const scale = h / 256;

  for (let x = 0; x < w; x++) {
    const bin = Math.floor(x * step);
    const v = dataArray[bin];
    const y = h - v * scale;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  /* ---- ピーク検出（強化版） ---- */
  const peakHz = getPrecisePeakHz(dataArray, analyser.fftSize, audioCtx.sampleRate);
  if (peakHz > 0) {
    const rawRpm = peakHz * 60;
    const calibratedRpm = rawRpm * calFactor;

    /* ---- スムージング ---- */
    const alpha = getSmoothAlpha(calibratedRpm);
    let displayRpm = calibratedRpm;
    if (lastRpm !== null) {
      displayRpm = lastRpm * (1 - alpha) + calibratedRpm * alpha;
    }
    lastRpm = displayRpm;

    /* ---- Auto Range ---- */
    autoAdjustRange(displayRpm);

    /* ---- 表示 ---- */
    document.getElementById("rpmFinal").textContent = Math.round(displayRpm);
  }
}

/* ---- ボタン ---- */
document.getElementById("startButton").addEventListener("click", () => {
  if (!audioCtx || audioCtx.state === "suspended") {
    startAudio();
  } else {
    audioCtx.resume();
    running = true;
    loop();
  }
});

document.getElementById("stopButton").addEventListener("click", stopAudio);
</script>
</body>
</html>
