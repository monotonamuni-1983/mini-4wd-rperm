<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini4WD Hyper RPM Analyzer</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- 🔵 メインページ -->
    <!-- ========================= -->
    <div id="page-main" class="page active">

        <h2>リアルタイム計測</h2>

        <div id="realtime-area">
            <div class="metric-large">
                <label>RPM</label>
                <span id="dispRPM">0</span>
            </div>

            <div class="metric-box">
                <label>時速</label>
                <span id="dispKmh">0.00</span>
            </div>

            <div class="metric-box" id="dispPoles" style="display:none;">
                <label>極数</label>
                <span id="dispPolesVal">1</span>
            </div>
        </div>

        <div class="button-row">
            <button id="btnMeasure" class="btn-primary">計測</button>
            <button id="btnLock" class="btn-secondary">ロック</button>
            <button id="btnSave" class="btn-secondary">保存</button>
            <button id="btnReset" class="btn-danger">リセット</button>
        </div>

        <canvas id="spectrumCanvas"></canvas>

        <!-- ========================= -->
        <!-- ⚙ 基本設定 -->
        <!-- ========================= -->
        <div class="section">
            <h3>基本設定</h3>

            <label>電圧 (V)</label>
            <input type="range" id="inputVolt" min="1" max="10" step="0.1">
            <span id="dispVolt">5.0</span>

            <label>ギヤ比</label>
            <input type="range" id="inputGear" min="1" max="10" step="0.01">
            <span id="dispGear">3.50</span>

            <label>モーター極数</label>
            <input type="number" id="inputPoles" min="1" max="10" value="1">
        </div>

        <!-- ========================= -->
        <!-- 📁 プリセット -->
        <!-- ========================= -->
        <div class="section">
            <h3>設定プリセット</h3>

            <select id="presetSelect"></select>

            <div class="button-row" style="margin-top:8px;">
                <button id="presetSaveBtn" class="btn-secondary">現状保存</button>
                <button id="presetRenameBtn" class="btn-secondary">名前変更</button>
                <button id="presetDeleteBtn" class="btn-danger">データ消去</button>
            </div>
        </div>

        <!-- ========================= -->
        <!-- 📊 比較表（ページ最下部） -->
        <!-- ========================= -->
        <div class="section">
            <h3>📋 電圧・ギヤ比別 車輪回転数＆時速 比較表</h3>
            <div class="table-responsive">
                <table id="matrixTable"></table>
            </div>
        </div>

    </div>

    <!-- ========================= -->
    <!-- 🟠 履歴ページ -->
    <!-- ========================= -->
    <div id="page-history" class="page">

        <h2>複数モーター比較ベンチ</h2>
        <table id="compareTable"></table>

        <h2>全体計測履歴</h2>
        <table id="historyTable"></table>

    </div>

    <!-- ========================= -->
    <!-- 🟣 カルテページ -->
    <!-- ========================= -->
    <div id="page-karute" class="page">

        <h2>モーターカルテ</h2>

        <div id="karteSummary"></div>

    </div>

    <!-- ========================= -->
    <!-- ⚙ 設定モーダル -->
    <!-- ========================= -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <h3>設定</h3>

            <label>ノイズ閾値</label>
            <input type="number" id="inputNoise" min="0" max="1000">

            <label>校正係数</label>
            <input type="number" id="inputCalib" min="0" max="10" step="0.01">

            <div class="button-row">
                <button id="settingsOk" class="btn-primary">OK</button>
                <button id="settingsCancel" class="btn-danger">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- 📝 プリセット名入力モーダル -->
    <!-- ========================= -->
    <div id="presetNameModal" class="modal-overlay">
        <div class="modal-content">
            <h3>プリセット名の入力</h3>

            <input id="presetNameInput" type="text" maxlength="8"
                placeholder="最大8文字" style="width:100%; padding:8px;">

            <div class="button-row" style="margin-top:12px;">
                <button id="presetNameOk" class="btn-secondary">OK</button>
                <button id="presetNameCancel" class="btn-danger">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- 📌 JS 読み込み -->
    <!-- ========================= -->
    <script src="js/main.js"></script>
    <script src="js/preset.js"></script>
    <script src="js/ui.js"></script>

</body>
</html>
