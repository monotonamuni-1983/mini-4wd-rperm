<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPM Analyzer</title>

<style>
/* ===== 全体 ===== */
body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  font-family: "Segoe UI", sans-serif;
  color: #222;
}

/* ===== ヘッダー ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: #f7f9fc;
  border-bottom: 1px solid #e5e7eb;
}

header h1 {
  font-size: 20px;
  margin: 0;
  color: #333;
}

nav button {
  margin-left: 14px;
  background: #e6ecff;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  font-weight: 600;
  color: #4a6cff;
  cursor: pointer;
}

/* ===== メインコンテナ ===== */
.container {
  padding: 18px;
}

/* ===== セクションタイトル ===== */
.section-title {
  font-size: 18px;
  font-weight: bold;
  margin: 20px 0 10px;
  color: #333;
}

/* ===== FFTキャンバス ===== */
#waveCanvas {
  width: 100%;
  height: 180px;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
}

/* ===== 計測値表示 ===== */
.measure-box {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 16px;
}

.measure-item {
  background: #f7f9fc;
  padding: 12px;
  border-radius: 6px;
  text-align: center;
  border: 1px solid #e5e7eb;
}

.measure-item span.label {
  display: block;
  font-size: 13px;
  color: #666;
}

.measure-item span.value {
  display: block;
  font-size: 20px;
  font-weight: bold;
  margin-top: 4px;
  color: #ff4fa3;
}

/* ===== ボタン ===== */
.btn-row {
  margin-top: 18px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

#startBtn { background: #ff4fa3; color: #fff; }
#lockBtn { background: #0078ff; color: #fff; }
#saveBtn { background: #10b981; color: #fff; }
#resetBtn { background: #6b7280; color: #fff; }

/* ===== 計測条件 ===== */
.condition-box {
  margin-top: 24px;
  padding: 14px;
  background: #f7f9fc;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
}

.condition-row {
  margin-bottom: 14px;
}

.condition-row label {
  display: block;
  font-size: 14px;
  margin-bottom: 4px;
}

.condition-row input[type="range"] {
  width: 100%;
}

/* ===== 比較表 ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
}

table th, table td {
  border: 1px solid #e5e7eb;
  padding: 8px;
  text-align: center;
}

.highlight-row {
  background: #fff0f7;
}

.highlight-col {
  background: #e0f2ff;
}

/* ===== モーダル（ポップアップ） ===== */
.modal-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal {
  background: #ffffff;
  width: 90%;
  max-width: 420px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

.modal h2 {
  margin-top: 0;
  font-size: 18px;
  font-weight: bold;
}

.modal label {
  display: block;
  margin-top: 12px;
  font-size: 14px;
}

.modal input,
.modal select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
}

.modal button {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.close-btn {
  background: #6b7280;
  color: #fff;
}

.save-btn {
  background: #10b981;
  color: #fff;
}

/* ===== 履歴フィルタ（ラベル付き） ===== */
.filter-box {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}

.filter-item label {
  font-size: 13px;
  margin-bottom: 4px;
  display: block;
}

.filter-item select {
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
}
</style>
</head>
<body>
<body>

<header>
  <h1>RPM Analyzer</h1>
  <nav>
    <button id="historyBtn">履歴</button>
    <button id="settingsBtn">設定</button>
  </nav>
</header>

<div class="container">

  <!-- ===== FFTスペクトラム ===== -->
  <div class="section-title">リアルタイム計測</div>
  <canvas id="waveCanvas"></canvas>

  <!-- ===== 計測値 ===== -->
  <div class="measure-box">
    <div class="measure-item">
      <span class="label">RPM</span>
      <span class="value" id="rpmNow">0</span>
    </div>
    <div class="measure-item">
      <span class="label">MAX</span>
      <span class="value" id="rpmMax">0</span>
    </div>
    <div class="measure-item">
      <span class="label">MIN</span>
      <span class="value" id="rpmMin">0</span>
    </div>
  </div>

  <div class="measure-box" style="margin-top: 10px;">
    <div class="measure-item">
      <span class="label">SPEED</span>
      <span class="value" id="speedNow">0.00 km/h</span>
    </div>
    <div class="measure-item">
      <span class="label">TOP</span>
      <span class="value" id="speedTop">0.00 km/h</span>
    </div>
    <div class="measure-item">
      <span class="label">MIN</span>
      <span class="value" id="speedMin">0.00 km/h</span>
    </div>
  </div>

  <!-- ===== ボタン ===== -->
  <div class="btn-row">
    <button id="startBtn">計測開始</button>
    <button id="lockBtn">ロック</button>
    <button id="saveBtn">保存</button>
    <button id="resetBtn">リセット</button>
  </div>

  <!-- ===== 計測条件 ===== -->
  <div class="section-title">計測条件</div>

  <div class="condition-box">
    <div class="condition-row">
      <label>電圧：<span id="voltageLabel">2.8</span></label>
      <input id="voltageRange" type="range" min="2.2" max="3.4" step="0.1" value="2.8">
    </div>

    <div class="condition-row">
      <label>ギヤ比：<span id="gearLabel">3.5:1</span></label>
      <input id="gearRange" type="range" min="0" max="10" step="1" value="0">
    </div>

    <div class="condition-row">
      <label>タイヤ径：<span id="tireLabel">26.0 mm</span></label>
      <input id="tireRange" type="range" min="22.0" max="34.0" step="0.1" value="26.0">
    </div>
  </div>

  <!-- ===== 比較表 ===== -->
  <div class="section-title">比較表</div>
  <table id="comparisonTable">
    <thead>
      <tr id="comparisonHeader">
        <th>電圧</th>
        <th>RPM</th>
        <!-- ギヤ比ヘッダーは JS で自動生成 -->
      </tr>
    </thead>
    <tbody id="comparisonBody"></tbody>
  </table>

</div><!-- container -->

<!-- ============================================================
     保存モーダル
============================================================ -->
<div class="modal-bg" id="saveModalBg">
  <div class="modal">
    <h2>保存</h2>

    <label>名前（8文字まで）</label>
    <input id="saveNameInput" maxlength="8">

    <label>モーター種類</label>
    <select id="motorTypeSelect">
      <option value="ノーマル">ノーマル</option>
      <option value="レブチューン">レブチューン</option>
      <option value="トルクチューン">トルクチューン</option>
      <option value="アトミックチューン">アトミックチューン</option>
      <option value="ライトダッシュ">ライトダッシュ</option>
      <option value="ハイパーダッシュ3">ハイパーダッシュ3</option>
      <option value="パワーダッシュ">パワーダッシュ</option>
      <option value="スプリントダッシュ">スプリントダッシュ</option>
    </select>

    <button class="save-btn" id="saveConfirmBtn">保存する</button>
    <button class="close-btn" id="saveCancelBtn">キャンセル</button>
  </div>
</div>

<!-- ============================================================
     履歴モーダル
============================================================ -->
<div class="modal-bg" id="historyModalBg">
  <div class="modal">
    <h2>履歴一覧</h2>

    <div class="filter-box">

      <div class="filter-item">
        <label>電圧</label>
        <select id="filterVoltage"></select>
      </div>

      <div class="filter-item">
        <label>ギヤ比</label>
        <select id="filterGear"></select>
      </div>

      <div class="filter-item">
        <label>タイヤ径</label>
        <select id="filterTire"></select>
      </div>

      <div class="filter-item">
        <label>モーター</label>
        <select id="filterMotor"></select>
      </div>

      <div class="filter-item">
        <label>名前</label>
        <select id="filterName"></select>
      </div>

    </div>

    <div id="historyList"></div>

    <button class="close-btn" id="historyCloseBtn">閉じる</button>
  </div>
</div>

<!-- ============================================================
     設定モーダル
============================================================ -->
<div class="modal-bg" id="settingsModalBg">
  <div class="modal">
    <h2>設定</h2>

    <label>ノイズ閾値：<span id="noiseLabel">30 dB</span></label>
    <input id="noiseRange" type="range" min="0" max="100" step="1" value="30">

    <label>RPM補正係数：<span id="rpmCalLabel">1.00</span></label>
    <input id="rpmCalRange" type="range" min="0.50" max="1.50" step="0.01" value="1.00">

    <label>負荷係数：<span id="loadFactorLabel">0%</span></label>
    <input id="loadFactorRange" type="range" min="-50" max="50" step="1" value="0">

    <button class="close-btn" id="settingsCloseBtn">閉じる</button>
  </div>
</div>

<!-- ============================= -->
<!-- Part3 : UIイベント（モーダル開閉＋保存処理） -->
<!-- ============================= -->
<script>
/* ============================================================
   要素取得
============================================================ */
const startBtn = document.getElementById("startBtn");
const lockBtn = document.getElementById("lockBtn");
const saveBtn = document.getElementById("saveBtn");
const resetBtn = document.getElementById("resetBtn");

/* 保存モーダル */
const saveModalBg = document.getElementById("saveModalBg");
const saveNameInput = document.getElementById("saveNameInput");
const motorTypeSelect = document.getElementById("motorTypeSelect");
const saveConfirmBtn = document.getElementById("saveConfirmBtn");
const saveCancelBtn = document.getElementById("saveCancelBtn");

/* 履歴モーダル */
const historyBtn = document.getElementById("historyBtn");
const historyModalBg = document.getElementById("historyModalBg");
const historyCloseBtn = document.getElementById("historyCloseBtn");

/* 設定モーダル */
const settingsBtn = document.getElementById("settingsBtn");
const settingsModalBg = document.getElementById("settingsModalBg");
const settingsCloseBtn = document.getElementById("settingsCloseBtn");

/* 計測状態 */
let measuring = false;
let locked = false;

/* ============================================================
   モーダル開閉（共通関数）
============================================================ */
function openModal(bg) {
  bg.style.display = "flex";
}

function closeModal(bg) {
  bg.style.display = "none";
}

/* ============================================================
   保存モーダル
============================================================ */
saveBtn.addEventListener("click", () => {
  saveNameInput.value = "";
  motorTypeSelect.value = "ノーマル";
  openModal(saveModalBg);
});

saveCancelBtn.addEventListener("click", () => {
  closeModal(saveModalBg);
});

/* 保存処理 */
saveConfirmBtn.addEventListener("click", () => {
  const name = saveNameInput.value.trim();
  const motor = motorTypeSelect.value;

  if (name.length === 0) {
    alert("名前を入力してください");
    return;
  }

  saveCurrentHistory(name, motor);
  closeModal(saveModalBg);
});

/* ============================================================
   履歴モーダル
============================================================ */
historyBtn.addEventListener("click", () => {
  openModal(historyModalBg);
});

historyCloseBtn.addEventListener("click", () => {
  closeModal(historyModalBg);
});

/* ============================================================
   設定モーダル
============================================================ */
settingsBtn.addEventListener("click", () => {
  openModal(settingsModalBg);
});

settingsCloseBtn.addEventListener("click", () => {
  closeModal(settingsModalBg);
});

/* ============================================================
   計測開始 / 停止
============================================================ */
startBtn.addEventListener("click", () => {
  measuring = !measuring;

  if (measuring) {
    startBtn.textContent = "計測停止";
    startMic();
  } else {
    startBtn.textContent = "計測開始";
    stopMic();
  }
});

/* ============================================================
   ロック
============================================================ */
lockBtn.addEventListener("click", () => {
  locked = !locked;

  if (locked) {
    lockBtn.textContent = "ロック解除";
    lockCurrent();
  } else {
    lockBtn.textContent = "ロック";
    unlockCurrent();
  }
});

/* ============================================================
   リセット
============================================================ */
resetBtn.addEventListener("click", () => {
  measuring = false;
  locked = false;

  startBtn.textContent = "計測開始";
  lockBtn.textContent = "ロック";

  resetMeasurement();
});
</script>

<!-- Part4 : プリセット管理 -->
<!-- ============================= -->
<script>
/* ============================================================
   プリセット要素
============================================================ */
const PRESET = {
  voltage: document.getElementById("voltageRange"),
  gear: document.getElementById("gearRange"),
  tire: document.getElementById("tireRange"),

  voltageLabel: document.getElementById("voltageLabel"),
  gearLabel: document.getElementById("gearLabel"),
  tireLabel: document.getElementById("tireLabel"),

  noise: document.getElementById("noiseRange"),
  rpmCal: document.getElementById("rpmCalRange"),
  load: document.getElementById("loadFactorRange"),

  noiseLabel: document.getElementById("noiseLabel"),
  rpmCalLabel: document.getElementById("rpmCalLabel"),
  loadLabel: document.getElementById("loadFactorLabel"),
};

/* ============================================================
   ギヤ比一覧
============================================================ */
const gearOptions = [
  "3.3:1",
  "3.5:1",
  "3.7:1",
  "3.9:1",
  "4.0:1",
  "4.2:1",
  "4.5:1",
  "5.0:1",
  "6.4:1",
  "8.75:1",
  "11.2:1"
];

/* ============================================================
   プリセット読み込み
============================================================ */
function loadPresets() {
  const sv = localStorage.getItem("preset_voltage");
  const sg = localStorage.getItem("preset_gearIndex");
  const st = localStorage.getItem("preset_tire");
  const sn = localStorage.getItem("preset_noise");
  const sr = localStorage.getItem("preset_rpmCal");
  const sl = localStorage.getItem("preset_load");

  if (sv !== null) PRESET.voltage.value = sv;
  if (sg !== null) PRESET.gear.value = sg;
  if (st !== null) PRESET.tire.value = st;
  if (sn !== null) PRESET.noise.value = sn;
  if (sr !== null) PRESET.rpmCal.value = sr;
  if (sl !== null) PRESET.load.value = sl;

  updatePresetLabels();
}

/* ============================================================
   ラベル更新
============================================================ */
function updatePresetLabels() {
  PRESET.voltageLabel.textContent =
    parseFloat(PRESET.voltage.value).toFixed(1);

  PRESET.gearLabel.textContent =
    gearOptions[parseInt(PRESET.gear.value, 10)];

  PRESET.tireLabel.textContent =
    parseFloat(PRESET.tire.value).toFixed(1) + " mm";

  PRESET.noiseLabel.textContent = PRESET.noise.value + " dB";
  PRESET.rpmCalLabel.textContent = parseFloat(PRESET.rpmCal.value).toFixed(2);
  PRESET.loadLabel.textContent = PRESET.load.value + "%";
}

/* ============================================================
   プリセット保存
============================================================ */
function savePresets() {
  localStorage.setItem("preset_voltage", PRESET.voltage.value);
  localStorage.setItem("preset_gearIndex", PRESET.gear.value);
  localStorage.setItem("preset_tire", PRESET.tire.value);
  localStorage.setItem("preset_noise", PRESET.noise.value);
  localStorage.setItem("preset_rpmCal", PRESET.rpmCal.value);
  localStorage.setItem("preset_load", PRESET.load.value);
}

/* ============================================================
   イベント（変更時に保存＋比較表更新）
============================================================ */
PRESET.voltage.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
  generateComparisonTableFromLock();
});

PRESET.gear.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
  generateComparisonTableFromLock();
});

PRESET.tire.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
  generateComparisonTableFromLock();
});

PRESET.noise.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
});

PRESET.rpmCal.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
});

PRESET.load.addEventListener("input", () => {
  updatePresetLabels();
  savePresets();
});

/* ============================================================
   初期ロード
============================================================ */
loadPresets();
</script>

<!-- Part5 : FFT / ロック / 比較表 / 履歴保存・フィルタ・削除 -->
<!-- ============================= -->
<script>
/* ============================================================
   モーター略称
============================================================ */
const motorAbbrev = {
  "ノーマル": "NM",
  "レブチューン": "RT",
  "トルクチューン": "TT",
  "アトミックチューン": "AT",
  "ライトダッシュ": "LD",
  "ハイパーダッシュ3": "HD3",
  "パワーダッシュ": "PD",
  "スプリントダッシュ": "SD"
};

/* ============================================================
   FFT / Audio
============================================================ */
let audioContext = null;
let analyser = null;
let micStream = null;
let dataArray = null;
let running = false;

const FFT_SIZE = 8192;

/* ============================================================
   Canvas
============================================================ */
const waveCanvas = document.getElementById("waveCanvas");
const ctx = waveCanvas.getContext("2d");

function resizeCanvas() {
  waveCanvas.width = waveCanvas.clientWidth;
  waveCanvas.height = waveCanvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* ============================================================
   計測値
============================================================ */
let currentRpm = 0;
let maxRpmVal = 0;
let minRpmVal = 0;

let currentSpeed = 0;
let maxSpeedVal = 0;
let minSpeedVal = 0;

let lockedSnapshot = null;

/* ============================================================
   マイク開始
============================================================ */
async function startMic() {
  if (running) return;

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  analyser = audioContext.createAnalyser();
  analyser.fftSize = FFT_SIZE;

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const source = audioContext.createMediaStreamSource(micStream);
  source.connect(analyser);

  running = true;
  loopFFT();
}

/* ============================================================
   マイク停止
============================================================ */
function stopMic() {
  running = false;

  if (audioContext) audioContext.suspend();
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
}

/* ============================================================
   高精度ピーク検出
============================================================ */
function getPrecisePeakHz(data, fftSize, sampleRate) {
  const binToHz = sampleRate / fftSize;

  let maxVal = -Infinity;
  let maxIdx = -1;

  for (let i = 1; i < data.length - 1; i++) {
    const v = data[i];
    if (v > maxVal) {
      maxVal = v;
      maxIdx = i;
    }
  }
  if (maxIdx <= 0 || maxIdx >= data.length - 1) return 0;

  const y1 = data[maxIdx - 1];
  const y2 = data[maxIdx];
  const y3 = data[maxIdx + 1];

  const denom = (y1 - 2 * y2 + y3);
  const offset = denom === 0 ? 0 : (y1 - y3) / (2 * denom);

  const peakBin = maxIdx + offset;
  return peakBin * binToHz;
}

/* ============================================================
   速度計算
============================================================ */
function computeSpeedFromRpm(rpm) {
  const tire = parseFloat(document.getElementById("tireRange").value);
  const gearIndex = parseInt(document.getElementById("gearRange").value, 10);
  const gearRatio = parseFloat(gearOptions[gearIndex].split(":")[0]);

  const rpmCal = parseFloat(document.getElementById("rpmCalRange").value);
  const loadFactor = parseFloat(document.getElementById("loadFactorRange").value) / 100;

  const adjustedRpm = rpm * rpmCal;
  const wheelRpm = adjustedRpm / gearRatio;
  const wheelRps = wheelRpm / 60;
  const circumference = Math.PI * (tire / 1000);

  let speed = wheelRps * circumference * 3.6;
  speed *= 1 + loadFactor;

  return { adjustedRpm, speed };
}

/* ============================================================
   FFTループ（RPM軸）
============================================================ */
function loopFFT() {
  if (!running) return;
  requestAnimationFrame(loopFFT);

  analyser.getByteFrequencyData(dataArray);

  const w = waveCanvas.width;
  const h = waveCanvas.height;

  ctx.clearRect(0, 0, w, h);

  const minRpm = 5000;
  const maxRpm = 60000;
  const minHz = minRpm / 60;
  const maxHz = maxRpm / 60;
  const binToHz = audioContext.sampleRate / analyser.fftSize;

  ctx.beginPath();
  ctx.strokeStyle = "#ff4fa3";
  ctx.lineWidth = 2;

  for (let x = 0; x < w; x++) {
    const ratio = x / w;
    const hz = minHz + (maxHz - minHz) * ratio;
    const bin = Math.floor(hz / binToHz);

    const v = dataArray[bin] || 0;
    const y = h - (v * (h / 256));

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  if (locked) return;

  const peakHz = getPrecisePeakHz(dataArray, analyser.fftSize, audioContext.sampleRate);
  if (peakHz > 0) {
    const rawRpm = peakHz * 60;
    const { adjustedRpm, speed } = computeSpeedFromRpm(rawRpm);

    currentRpm = adjustedRpm;
    currentSpeed = speed;

    if (maxRpmVal === 0 || adjustedRpm > maxRpmVal) maxRpmVal = adjustedRpm;
    if (minRpmVal === 0 || adjustedRpm < minRpmVal) minRpmVal = adjustedRpm;

    if (maxSpeedVal === 0 || speed > maxSpeedVal) maxSpeedVal = speed;
    if (minSpeedVal === 0 || speed < minSpeedVal) minSpeedVal = speed;

    rpmNow.textContent = Math.round(adjustedRpm);
    rpmMax.textContent = Math.round(maxRpmVal);
    rpmMin.textContent = Math.round(minRpmVal);

    speedNow.textContent = speed.toFixed(2) + " km/h";
    speedTop.textContent = maxSpeedVal.toFixed(2) + " km/h";
    speedMin.textContent = minSpeedVal.toFixed(2) + " km/h";

    generateComparisonTableFromLock();
  }
}

/* ============================================================
   ロック
============================================================ */
function lockCurrent() {
  lockedSnapshot = {
    rpm: currentRpm,
    speed: currentSpeed
  };
}

function unlockCurrent() {
  lockedSnapshot = null;
  comparisonBody.innerHTML = "";
}

/* ============================================================
   比較表ヘッダー生成
============================================================ */
function buildComparisonHeader() {
  const header = document.getElementById("comparisonHeader");

  header.innerHTML = `
    <th>電圧</th>
    <th>RPM</th>
  `;

  gearOptions.forEach(g => {
    const th = document.createElement("th");
    th.textContent = `${g} (km/h)`;
    header.appendChild(th);
  });
}
buildComparisonHeader();

/* ============================================================
   比較表生成（ロック基準）
============================================================ */
function generateComparisonTableFromLock() {
  if (!lockedSnapshot) return;

  const baseRpm = lockedSnapshot.rpm;
  const tire = parseFloat(document.getElementById("tireRange").value);
  const currentVoltage = parseFloat(document.getElementById("voltageRange").value).toFixed(1);

  comparisonBody.innerHTML = "";

  for (let v = 2.2; v <= 3.4; v += 0.1) {
    const voltage = v.toFixed(1);
    const tr = document.createElement("tr");

    if (voltage === currentVoltage) tr.classList.add("highlight-row");

    const tdV = document.createElement("td");
    tdV.textContent = voltage;
    tr.appendChild(tdV);

    const rpm = Math.round(baseRpm * (v / currentVoltage));
    const tdR = document.createElement("td");
    tdR.textContent = rpm;
    tr.appendChild(tdR);

    gearOptions.forEach(g => {
      const gearRatio = parseFloat(g.split(":")[0]);
      const wheelRpm = rpm / gearRatio;
      const wheelRps = wheelRpm / 60;
      const circumference = Math.PI * (tire / 1000);
      const speed = wheelRps * circumference * 3.6;

      const td = document.createElement("td");
      td.textContent = speed.toFixed(2);

      const currentGear = gearOptions[parseInt(document.getElementById("gearRange").value)];
      if (g === currentGear) td.classList.add("highlight-col");

      tr.appendChild(td);
    });

    comparisonBody.appendChild(tr);
  }
}

/* ============================================================
   リセット
============================================================ */
function resetMeasurement() {
  running = false;
  stopMic();

  currentRpm = 0;
  maxRpmVal = 0;
  minRpmVal = 0;

  currentSpeed = 0;
  maxSpeedVal = 0;
  minSpeedVal = 0;

  rpmNow.textContent = "0";
  rpmMax.textContent = "0";
  rpmMin.textContent = "0";

  speedNow.textContent = "0.00 km/h";
  speedTop.textContent = "0.00 km/h";
  speedMin.textContent = "0.00 km/h";

  comparisonBody.innerHTML = "";
}

/* ============================================================
   履歴保存
============================================================ */
function saveCurrentHistory(name, motorType) {
  const voltage = parseFloat(document.getElementById("voltageRange").value).toFixed(1);
  const gearIndex = parseInt(document.getElementById("gearRange").value, 10);
  const gearStr = gearOptions[gearIndex];
  const tire = parseFloat(document.getElementById("tireRange").value).toFixed(1);

  const entry = {
    date: new Date().toLocaleDateString("ja-JP").replace(/\//g, ""),
    name,
    motor: motorAbbrev[motorType] || motorType,
    voltage,
    gear: gearStr,
    tire,
    rpm: Math.round(currentRpm),
    speed: currentSpeed.toFixed(2),
  };

  const list = JSON.parse(localStorage.getItem("rpmHistory") || "[]");
  list.unshift(entry);
  localStorage.setItem("rpmHistory", JSON.stringify(list));

  renderHistory();
  buildFilterOptions();
}

/* ============================================================
   履歴フィルタ
============================================================ */
function buildFilterOptions() {
  const list = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

  const voltages = new Set();
  const gears = new Set();
  const tires = new Set();
  const motors = new Set();
  const names = new Set();

  list.forEach(item => {
    voltages.add(item.voltage);
    gears.add(item.gear);
    tires.add(item.tire);
    motors.add(item.motor);
    names.add(item.name);
  });

  fillSelect(filterVoltage, voltages);
  fillSelect(filterGear, gears);
  fillSelect(filterTire, tires);
  fillSelect(filterMotor, motors);
  fillSelect(filterName, names);
}

function fillSelect(select, values) {
  const current = select.value;

  select.innerHTML = `<option value=""></option>`;

  [...values].forEach(v => {
    if (!v) return;
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });

  select.value = current;
}

function applyHistoryFilter(list) {
  return list.filter(item => {
    if (filterVoltage.value && item.voltage !== filterVoltage.value) return false;
    if (filterGear.value && item.gear !== filterGear.value) return false;
    if (filterTire.value && item.tire !== filterTire.value) return false;
    if (filterMotor.value && item.motor !== filterMotor.value) return false;
    if (filterName.value && item.name !== filterName.value) return false;
    return true;
  });
}

/* ============================================================
   履歴表示
============================================================ */
function renderHistory() {
  const list = JSON.parse(localStorage.getItem("rpmHistory") || "[]");
  const filtered = applyHistoryFilter(list);

  historyList.innerHTML = "";

  filtered.forEach((item, index) => {
    const row = document.createElement("div");
    row.className = "history-row";

    row.innerHTML = `
      <span>${item.date}</span>
      <span>${item.name}</span>
      <span>${item.motor}</span>
      <span>${item.speed}</span>
      <span>${item.rpm}</span>
      <span>${item.voltage}</span>
      <span>${item.gear}</span>
      <span>${item.tire}</span>
      <button class="delete-history-btn" data-index="${index}">削除</button>
    `;

    historyList.appendChild(row);
  });

  document.querySelectorAll(".delete-history-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const index = parseInt(btn.dataset.index, 10);
      const list = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

      list.splice(index, 1);
      localStorage.setItem("rpmHistory", JSON.stringify(list));

      renderHistory();
      buildFilterOptions();
    });
  });
}

/* ============================================================
   初期化
============================================================ */
renderHistory();
buildFilterOptions();
</script>
