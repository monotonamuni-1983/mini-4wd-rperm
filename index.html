<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>RPM Analyzer — Advanced FFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <style>
    body { margin:0; padding:0; background:#fff; font-family:"Noto Sans JP",sans-serif; color:#333; }
    .main-container { padding:12px 16px; max-width:480px; margin:0 auto; }
    .card { background:#f5f7fc; border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size:1.05rem; font-weight:700; margin-bottom:12px; }
    #waveCanvas { width:100%; height:160px; background:#fff; border-radius:12px; box-shadow:inset 0 0 6px rgba(0,0,0,0.08); display:block; }
    .rpm-grid, .speed-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:12px; margin-left:20px; }
    .rpm-grid div, .speed-grid div { display:flex; flex-direction:column; }
    .rpm-grid span:last-child, .speed-grid span:last-child { font-weight:700; font-size:1.25rem; }
    .rpm-limit-box { margin:16px 0; padding:16px; background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .rpm-limit-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .limit-slider { flex:1; margin:0 12px; accent-color:#4fa3ff; }
    .limit-value { width:70px; text-align:right; font-weight:700; }
    .status-line { margin-top:12px; font-size:0.95rem; color:#666; }
    .btn-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .primary-btn, .secondary-btn {
      padding:14px 0; border-radius:999px; font-weight:700; border:none; font-size:0.95rem;
    }
    .primary-btn { background:#ff4fa3; color:#fff; }
    .secondary-btn { background:#e6ecff; color:#4a6cff; }
    .realtime-buttons-2row { margin-top:14px; display:flex; flex-direction:column; gap:12px; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; justify-content:center; align-items:flex-end; }
    .modal { width:100%; max-width:480px; background:#f5f7fc; border-radius:18px 18px 0 0; padding:20px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- FFTカード（1つだけ） -->
    <section class="card">
      <div class="card-title">FFT Spectrum</div>
      <canvas id="waveCanvas"></canvas>
      <div class="rpm-grid">
        <div><span>RPM</span><span id="rpmNow">--</span></div>
        <div><span>MAX</span><span id="rpmMax">--</span></div>
        <div><span>MIN</span><span id="rpmMin">--</span></div>
      </div>
      <div class="speed-grid">
        <div><span>SPEED</span><span id="speedNow">-- km/h</span></div>
        <div><span>TOP</span><span id="speedTop">-- km/h</span></div>
        <div><span>MIN</span><span id="speedMin">-- km/h</span></div>
      </div>

      <div class="rpm-limit-box">
        <div class="rpm-limit-row">
          <label>RPM表示下限</label>
          <input id="rpmMinLimit" type="range" min="0" max="10000" value="5000">
          <span id="rpmMinLimitValue">5000</span>
        </div>
        <div class="rpm-limit-row">
          <label>RPM表示上限</label>
          <input id="rpmMaxLimit" type="range" min="10000" max="80000" value="60000">
          <span id="rpmMaxLimitValue">60000</span>
        </div>
      </div>

      <div id="statusLine" class="status-line">READY — 計測待機中</div>

      <div class="realtime-buttons-2row">
        <div class="btn-row">
          <button id="startBtn" class="primary-btn">計測開始</button>
          <button id="lockBtn" class="secondary-btn">ロック</button>
          <button id="saveBtn" class="secondary-btn">保存</button>
        </div>
        <div class="btn-row">
          <button id="historyBtn2" class="secondary-btn">履歴</button>
          <button id="settingsBtn2" class="secondary-btn">設定</button>
          <button id="resetBtn" class="secondary-btn">リセット</button>
        </div>
      </div>
    </section>

    <!-- 計測条件カード -->
    <section class="card">
      <div class="card-title">計測条件</div>
      <div><label>電圧</label><input id="voltageRange" type="range" min="2.2" max="3.4" step="0.1" value="3.0"><span id="voltageLabel">3.0 V</span></div>
      <div><label>ギヤ比</label><input id="gearRange" type="range" min="0" max="7" step="1" value="2"><span id="gearLabel">4.0:1</span></div>
      <div><label>タイヤ径</label><input id="tireRange" type="range" min="24.0" max="28.0" step="0.5" value="26.0"><span id="tireLabel">26.0 mm</span></div>
    </section>
  </div>

  <!-- モーダル（簡略版） -->
  <div id="historyModalBackdrop" class="modal-backdrop hidden"><div class="modal">履歴（未実装）</div></div>
  <div id="saveModalBackdrop" class="modal-backdrop hidden"><div class="modal">保存（未実装）</div></div>
  <div id="settingsModalBackdrop" class="modal-backdrop hidden"><div class="modal">設定（未実装）</div></div>

  <script>
    const SAMPLE_RATE = 44100;
    const FFT_SIZE = 16384;

    let audioContext = null, analyser = null, micStream = null, fftBuffer;
    let running = false, locked = false;

    const state = { rpmNow:0, rpmMax:0, rpmMin:Infinity, speedNow:0, speedTop:0, speedMin:Infinity,
                    voltage:3.0, gearIndex:2, tireMm:26.0 };

    const UI = {
      waveCanvas: document.getElementById("waveCanvas"),
      rpmNow: document.getElementById("rpmNow"), rpmMax: document.getElementById("rpmMax"), rpmMin: document.getElementById("rpmMin"),
      speedNow: document.getElementById("speedNow"), speedTop: document.getElementById("speedTop"), speedMin: document.getElementById("speedMin"),
      statusLine: document.getElementById("statusLine"),
      startBtn: document.getElementById("startBtn"),
      lockBtn: document.getElementById("lockBtn"),
      saveBtn: document.getElementById("saveBtn"),
      resetBtn: document.getElementById("resetBtn"),
      historyBtn2: document.getElementById("historyBtn2"),
      settingsBtn2: document.getElementById("settingsBtn2"),
      rpmMinLimit: document.getElementById("rpmMinLimit"),
      rpmMaxLimit: document.getElementById("rpmMaxLimit"),
      rpmMinLimitValue: document.getElementById("rpmMinLimitValue"),
      rpmMaxLimitValue: document.getElementById("rpmMaxLimitValue"),
      voltageRange: document.getElementById("voltageRange"), voltageLabel: document.getElementById("voltageLabel"),
      gearRange: document.getElementById("gearRange"), gearLabel: document.getElementById("gearLabel"),
      tireRange: document.getElementById("tireRange"), tireLabel: document.getElementById("tireLabel")
    };

    function resizeCanvas() {
      const c = UI.waveCanvas;
      c.width = c.clientWidth * (window.devicePixelRatio || 1);
      c.height = 160 * (window.devicePixelRatio || 1);
    }

    async function initAudio() {
      if (audioContext) return;
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
      micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }});
      const source = audioContext.createMediaStreamSource(micStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = FFT_SIZE;
      analyser.smoothingTimeConstant = 0;
      source.connect(analyser);
      fftBuffer = new Float32Array(analyser.frequencyBinCount);
    }

    function drawFFT() {
      if (!analyser) return;
      analyser.getFloatFrequencyData(fftBuffer);
      const ctx = UI.waveCanvas.getContext("2d");
      const w = UI.waveCanvas.width, h = UI.waveCanvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.beginPath();
      ctx.strokeStyle = "#4a6cff";
      ctx.lineWidth = 2.5;
      for (let x = 0; x < w; x++) {
        const idx = Math.floor(x / w * fftBuffer.length);
        const val = (fftBuffer[idx] + 110) / 110;
        const y = h * (1 - Math.max(0, val));
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function detectPeak() {
      if (!analyser) return null;
      analyser.getFloatFrequencyData(fftBuffer);
      let max = -Infinity, idx = 0;
      for (let i = 0; i < fftBuffer.length; i++) {
        if (fftBuffer[i] > max) { max = fftBuffer[i]; idx = i; }
      }
      return idx * (SAMPLE_RATE / 2) / fftBuffer.length;
    }

    function computeRpm(peakHz) {
      if (!peakHz) return 0;
      return Math.round(peakHz * 60);
    }

    function updateUI(rpm) {
      if (!rpm || !isFinite(rpm)) return;
      state.rpmNow = rpm;
      state.rpmMax = Math.max(state.rpmMax, rpm);
      state.rpmMin = Math.min(state.rpmMin, rpm);
      UI.rpmNow.textContent = Math.round(rpm);
      UI.rpmMax.textContent = Math.round(state.rpmMax);
      UI.rpmMin.textContent = Math.round(state.rpmMin);
    }

    function loop() {
      if (!running || locked) return requestAnimationFrame(loop);
      drawFFT();
      const rpm = computeRpm(detectPeak());
      updateUI(rpm);
      requestAnimationFrame(loop);
    }

    // ボタン類の機能復活
    UI.startBtn.addEventListener("click", async () => {
      try {
        if (!audioContext) await initAudio();
        running = true;
        locked = false;
        UI.statusLine.textContent = "MEASURING — 計測中";
        loop();
      } catch(e) { UI.statusLine.textContent = "マイクエラー"; }
    });

    UI.lockBtn.addEventListener("click", () => {
      locked = !locked;
      UI.lockBtn.textContent = locked ? "ロック解除" : "ロック";
      UI.statusLine.textContent = locked ? "LOCKED — 停止中" : "MEASURING — 計測中";
    });

    UI.resetBtn.addEventListener("click", () => {
      running = false;
      locked = false;
      state.rpmNow = state.rpmMax = 0; state.rpmMin = Infinity;
      UI.rpmNow.textContent = UI.rpmMax.textContent = UI.rpmMin.textContent = "--";
      UI.speedNow.textContent = UI.speedTop.textContent = UI.speedMin.textContent = "-- km/h";
      UI.statusLine.textContent = "READY — 計測待機中";
    });

    // その他ボタン（仮）
    UI.historyBtn2.addEventListener("click", () => alert("履歴機能は現在開発中です"));
    UI.settingsBtn2.addEventListener("click", () => alert("設定機能は現在開発中です"));
    UI.saveBtn.addEventListener("click", () => alert("保存機能は現在開発中です"));

    window.addEventListener("load", () => {
      resizeCanvas();
      UI.rpmMinLimitValue.textContent = UI.rpmMinLimit.value;
      UI.rpmMaxLimitValue.textContent = UI.rpmMaxLimit.value;
    });
  </script>
</body>
</html>
