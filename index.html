<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor Tachometer Pro</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1c1c1e; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .box { background: var(--card); padding: 12px; border-radius: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .label { font-size: 0.65rem; color: #8e8e93; margin-bottom: 2px; }
        .value { font-size: 1rem; font-weight: 700; }
        .slider-box, .select-box { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .controls { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        #startBtn { background: var(--accent); color: white; }
        #stopBtn { background: #ff3b30; color: white; }
        #resetBtn { background: #e5e5ea; }
        #saveBtn { background: #34c759; color: white; }
        select, input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; font-size: 1rem; border: 1px solid #ccc; box-sizing: border-box; }
        #canvas { width: 100%; height: 150px; background: #000; border-radius: 16px; display: block; touch-action: none; margin-bottom: 5px; }
        .axis-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: #8e8e93; padding: 0 5px 15px; }
        /* モーダル */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvas"></canvas>
    <div class="axis-labels"><span>0</span><span>200</span><span>500</span><span>1k</span><span>2k</span><span>5k</span><span>10k</span><span>20k</span><span>40k</span><span>50k</span></div>

    <div class="grid">
        <div class="box"><div class="label">RPM</div><div id="rpmCur" class="value">0</div></div>
        <div class="box"><div class="label">MAX</div><div id="rpmMax" class="value">0</div></div>
        <div class="box"><div class="label">MIN</div><div id="rpmMin" class="value">0</div></div>
    </div>
    <div class="grid">
        <div class="box"><div class="label">SPEED</div><div id="spdCur" class="value">0.0</div></div>
        <div class="box"><div class="label">MAX</div><div id="spdMax" class="value">0.0</div></div>
        <div class="box"><div class="label">MIN</div><div id="spdMin" class="value">0.0</div></div>
    </div>

    <div class="controls">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
        <button id="resetBtn">リセット</button>
        <button id="saveBtn">保存</button>
    </div>

    <div class="slider-box">
        <div class="label">タイヤ外径: <span id="tireVal">26.0</span>mm</div>
        <input type="range" id="tireSlider" min="22.0" max="35.0" step="0.1" value="26.0" style="width: 100%;">
    </div>

    <div class="select-box">
        <div class="label">ギア比選択</div>
        <select id="gearSelect">
            <option value="3.5">3.5:1</option><option value="3.7">3.7:1</option><option value="4.0">4.0:1</option>
            <option value="4.2">4.2:1</option><option value="5.0">5.0:1</option><option value="6.4">6.4:1</option>
            <option value="8.75">8.75:1</option><option value="11.2">11.2:1</option>
        </select>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>データ保存</h3>
        <input type="text" id="nameInput" placeholder="名前 (必須)" required>
        <select id="motorSelect" style="margin-top:10px;">
            <option value="">モーターを選択してください</option>
            <option>ノーマル</option><option>レブチューン</option><option>トルクチューン</option><option>アトミックチューン</option>
            <option>ライトダッシュ</option><option>ハイパーダッシュ</option><option>パワーダッシュ</option><option>スプリントダッシュ</option>
            <option>ウルトラダッシュ</option><option>プラズマダッシュ</option><option>レブチューンPRO</option><option>トルクチューンPRO</option>
            <option>アトミックチューンPRO</option><option>ライトダッシュPRO</option><option>ハイバーダッシュPRO</option><option>マッハダッシュPRO</option>
        </select>
        <button id="confirmSave" style="margin-top:20px; background:var(--accent); color:white;">保存する</button>
    </div>
</div>

<script>
    // Audio処理を独立
    let audioCtx, analyser, dataArray, animationId;
    let lastRpm = 0;
    const stats = { maxRpm: 0, minRpm: 999999, maxSpd: 0, minSpd: 999999 };

    const el = {
        canvas: document.getElementById('canvas'),
        rpmCur: document.getElementById('rpmCur'), rpmMax: document.getElementById('rpmMax'), rpmMin: document.getElementById('rpmMin'),
        spdCur: document.getElementById('spdCur'), spdMax: document.getElementById('spdMax'), spdMin: document.getElementById('spdMin'),
        start: document.getElementById('startBtn'), stop: document.getElementById('stopBtn'), save: document.getElementById('saveBtn')
    };

    const ctx = el.canvas.getContext('2d');
    
    // 集音開始処理
    el.start.onclick = async () => {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 16384;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            el.start.disabled = true; el.stop.disabled = false;
            update();
        } catch (e) {
            alert("マイク許可が必要です。設定を確認してください。");
        }
    };

    el.stop.onclick = () => { cancelAnimationFrame(animationId); audioCtx.close(); el.start.disabled = false; el.stop.disabled = true; };
    el.save.onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('confirmSave').onclick = () => {
        if(!document.getElementById('nameInput').value) return alert("名前を入力してください");
        document.getElementById('modal').style.display = 'none';
        alert("保存しました！");
    };

    function update() {
        animationId = requestAnimationFrame(update);
        analyser.getByteFrequencyData(dataArray);
        // ... (省略: 前回の描画・計算ロジックと同じ)
    }
</script>
</body>
</html>
